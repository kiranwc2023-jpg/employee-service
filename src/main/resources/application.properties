# ═══════════════════════════════════════════════════════════════════════
# application.properties — Spring Boot Configuration
#
# WHY THIS FILE EXISTS:
#   Spring Boot's auto-configuration reads these key=value pairs and
#   wires your application accordingly — no XML, no @Configuration classes
#   needed for these standard settings.
#
# OVERRIDE HIERARCHY (lowest to highest priority):
#   1. application.properties (this file — default)
#   2. application-{profile}.properties (e.g., application-prod.properties)
#   3. Environment variables (e.g., SPRING_DATASOURCE_URL=...)
#   4. JVM system properties (e.g., -Dspring.datasource.url=...)
#   5. Command-line arguments (e.g., --spring.datasource.url=...)
#
# In Kubernetes, environment variables (step 3) override everything here.
# This is the 12-Factor App principle: store config in the environment.
# ═══════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────
# APPLICATION IDENTITY
# These values are injected into HealthController via @Value("${...}")
# ───────────────────────────────────────────────────────────────────────

# spring.application.name is used by:
#   - Spring Actuator (shows in /actuator/info)
#   - Spring Cloud service discovery (Eureka, Consul)
#   - Distributed tracing (Sleuth, Zipkin — correlates logs)
#   - Our HealthController (@Value injection)
spring.application.name=employee-service

# app.version is injected via @Value("${app.version:1.0.0}") in HealthController.
# During CI, the build pipeline replaces this value using Maven filtering:
#   mvn versions:set -DnewVersion=1.2.3
# The CI pipeline then updates this property to match the Git tag.
app.version=1.0.0

# ───────────────────────────────────────────────────────────────────────
# SERVER CONFIGURATION
# ───────────────────────────────────────────────────────────────────────

# The port Tomcat listens on for HTTP requests.
# Default is 8080. Change in production if something else uses 8080.
# In Kubernetes, this port is exposed via the Service YAML.
server.port=8080

# Graceful shutdown: when Kubernetes sends SIGTERM (pod termination),
# Spring waits up to 30 seconds for in-flight requests to complete
# before shutting down. Without this, requests are dropped immediately.
# "graceful" = wait for active requests. "immediate" = terminate instantly.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ───────────────────────────────────────────────────────────────────────
# DATABASE CONFIGURATION (H2 in-memory for development)
# In production, override these via Kubernetes ConfigMap + Secret:
#   spring.datasource.url = environment variable from ConfigMap
#   spring.datasource.password = environment variable from Secret
# ───────────────────────────────────────────────────────────────────────

# H2 in-memory database URL.
# jdbc:h2:mem:employeedb  → in-memory DB named "employeedb" (disappears on restart)
# DB_CLOSE_DELAY=-1       → keep the DB alive as long as the JVM runs
# DB_CLOSE_ON_EXIT=FALSE  → do not close when the connection pool closes
spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console — allows you to browse the in-memory database in your browser.
# URL: http://localhost:8080/h2-console
# WARNING: NEVER enable this in production. Set to false in application-prod.properties.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ───────────────────────────────────────────────────────────────────────
# JPA / HIBERNATE CONFIGURATION
# ───────────────────────────────────────────────────────────────────────

# hibernate.ddl-auto controls what Hibernate does to the DB schema on startup:
#   validate   → verify the DB matches the entities; fail if mismatch (best for production)
#   update     → add missing columns/tables; never drop (okay for development)
#   create     → drop and recreate all tables on startup (data loss!)
#   create-drop→ drop tables when application shuts down (tests only)
#   none       → do nothing (use Flyway/Liquibase for schema management in production)
#
# For development with H2: "create-drop" is acceptable (data is ephemeral anyway).
# For production: "validate" + Flyway migrations.
spring.jpa.hibernate.ddl-auto=create-drop

# show-sql=true logs every SQL statement Hibernate executes.
# CRITICAL: Disable in production — SQL logs are verbose and may leak sensitive data.
# Use this only during development to understand what queries JPA generates.
spring.jpa.show-sql=true

# format_sql=true makes the logged SQL human-readable with indentation.
# Has no effect if show-sql=false.
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect tells Hibernate which SQL dialect to generate.
# Without this, Hibernate auto-detects from the JDBC driver — but explicit is safer.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ───────────────────────────────────────────────────────────────────────
# SPRING ACTUATOR — Production Readiness Endpoints
# ───────────────────────────────────────────────────────────────────────

# Expose specific actuator endpoints over HTTP.
# "*" exposes all endpoints. For production, list only what you need:
#   management.endpoints.web.exposure.include=health,info,metrics,prometheus
spring.management.endpoints.web.exposure.include=health,info,metrics,env,loggers

# always = health details are always shown (even to unauthenticated users).
# when-authorized = only shown to authenticated users with specific roles.
# For production with Kubernetes: "always" is common because:
#   - Only Kubernetes network (internal) reaches this port
#   - The pod is isolated from the internet
management.endpoint.health.show-details=always

# Management server port — separates actuator from your API.
# Best practice: expose actuator on a separate port so you can firewall
# the API port (8080) differently from the management port (8081).
# Kubernetes liveness/readiness probes then point to port 8081.
management.server.port=8081

# ───────────────────────────────────────────────────────────────────────
# LOGGING CONFIGURATION
# ───────────────────────────────────────────────────────────────────────

# Log levels: TRACE < DEBUG < INFO < WARN < ERROR < FATAL < OFF
# Root level: INFO means only INFO, WARN, ERROR messages are logged.
# Setting DEBUG on your package means full debug logs for your code only.
logging.level.root=INFO
logging.level.com.company.employee=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Log pattern: includes timestamp, log level, thread, logger name (short), message.
# %d{yyyy-MM-dd HH:mm:ss} = ISO timestamp
# %-5level = log level padded to 5 chars (INFO , DEBUG, WARN )
# %thread = thread name (useful to identify async/virtual threads)
# %logger{36} = class name, max 36 chars (abbreviated)
# %msg = the actual log message
# %n = newline
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] [%thread] %logger{36} - %msg%n

# ───────────────────────────────────────────────────────────────────────
# JACKSON (JSON SERIALIZATION)
# ───────────────────────────────────────────────────────────────────────

# Prevents Jackson from failing when it encounters an unknown JSON field.
# Without this: adding a new field to JSON breaks old clients (400 Bad Request).
# With this: unknown fields are silently ignored — backwards compatible.
spring.jackson.deserialization.fail-on-unknown-properties=false

# Serializes dates as ISO-8601 strings instead of Unix timestamps.
# "2025-01-15" is human-readable; 1736899200000 is not.
spring.jackson.serialization.write-dates-as-timestamps=false

# Prevents Jackson from serializing properties that have null values.
# Without this: {"id": 1, "department": null, "salary": null} — null fields appear.
# With this: {"id": 1} — null fields are omitted.
# This reduces payload size and is cleaner for API consumers.
spring.jackson.default-property-inclusion=non_null

